<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Techix - Techonology Html Template</title>
  <!-- Stylesheets -->
  <link href="css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <link href="css/responsive.css" rel="stylesheet" />

  <link rel="shortcut icon" href="images/favicon.svg" type="image/x-icon" />
  <link rel="icon" href="images/favicon.svg" type="image/x-icon" />

  <!-- Responsive -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>

<div class="page-wrapper">

  <!--Custom Cursor Wrapper -->
  <div id="custom-cursor-wrapper" class="tp-cursor">
    <div id="cursor-outer">
      <div id="cursorDot"></div>
    </div>
  </div>

  <!-- Preloader Start -->
  <div id="preloader" class="preloader">
    <div class="animation-preloader">
      <div class="spinner"></div>
      <div class="txt-loading">
        <span data-text-preloader="T" class="letters-loading"> T </span>
        <span data-text-preloader="E" class="letters-loading"> E </span>
        <span data-text-preloader="C" class="letters-loading"> C </span>
        <span data-text-preloader="H" class="letters-loading"> H </span>
        <span data-text-preloader="I" class="letters-loading"> I </span>
        <span data-text-preloader="X" class="letters-loading"> X </span>
      </div>
      <p class="text-center">Loading</p>
    </div>
    <div class="loader">
      <div class="row">
        <div class="col-3 loader-section section-left">
          <div class="bg"></div>
        </div>
        <div class="col-3 loader-section section-left">
          <div class="bg"></div>
        </div>
        <div class="col-3 loader-section section-right">
          <div class="bg"></div>
        </div>
        <div class="col-3 loader-section section-right">
          <div class="bg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll To Top -->
  <div class="scroll-to-top scroll-to-target" data-target="html"><span class="fa fa-angle-up"></span></div>

  <!--End Main Header -->
  <div id="smooth-wrapper">
    <div id="smooth-content">

  <!-- 404 Section -->
  <section class="">
    <div class="auto-container pt-120 pb-70">
      <div class="row">
        <div class="col-xl-12">
          <div class="error-page__inner">
            <div class="error-page__title-box">
              <img src="images/home-1/inner/404.jpg" alt="">
              <h3 class="error-page__sub-title">Page not found!</h3>
            </div>
            <p class="error-page__text">Sorry we can't find that page! The page you are looking <br /> for
              was never existed.</p>
            <form class="error-page__form">
              <div class="error-page__form-input">
                <input type="search" placeholder="Search here">
                <button type="submit"><i class="lnr lnr-icon-magnifier"></i></button>
              </div>
            </form>
            <a href="index.html" class="theme-btn btn-style-one shop-now"><span class="btn-title">Back to Home</span></a>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!--End 404 Section -->

    </div>
  </div>
</div>
  <!-- End Page Wrapper -->
  <script src="js/jquery.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/jquery.fancybox.js"></script>
  <script src="js/jquery-ui.js"></script>
  <script src="js/gsap.js"></script>
  <script src="js/gsap-scroll-to-plugin.js"></script>
  <script src="js/gsap-scroll-smoother.js"></script>
  <script src="js/gsap-scroll-trigger.js"></script>
  <script src="js/gsap-split-text.js"></script>
  <script src="js/split-type.min.js"></script>
  <script src="js/parallaxie.js"></script>
  <script src="js/jquery.magnific-popup.min.js"></script>
  <script src="js/wow.js"></script>
  <script src="js/bxslider.js"></script>
  <script src="js/nice-select.min.js"></script>
  <script src="js/knob.js"></script>
  <script src="js/appear.js"></script>
  <script src="js/swiper.min.js"></script>
  <script src="js/mixitup.js"></script>
  <script src="js/script.js"></script>

    
  <!-- form submit -->
  <script src="js/jquery.validate.min.js"></script>
  <script src="js/jquery.form.min.js"></script>
  <script src="js/contact-form-script.js"></script>
</body>
</html>
